<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐟 Toddler Fishing Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --sky-top: #87CEEB;
    --sky-bottom: #E0F4FF;
    --water-top: #4A90D9;
    --water-mid: #357ABD;
    --water-bottom: #2C5F8A;
    --grass: #5CB85C;
    --grass-dark: #449D44;
    --bucket-body: #E67E22;
    --bucket-dark: #D35400;
    --wood: #8B6914;
    --wood-dark: #6B4F12;
    --bait-color: #E74C3C;
    --ui-bg: rgba(255,255,255,0.9);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Fredoka', sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .score-panel {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--ui-bg);
    border-radius: 20px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 28px;
    font-weight: 700;
    color: #2C3E50;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    pointer-events: auto;
  }

  .bait-panel {
    position: absolute;
    top: 12px; left: 12px;
    background: var(--ui-bg);
    border-radius: 20px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 22px;
    font-weight: 600;
    color: #2C3E50;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    pointer-events: auto;
  }

  .message-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: var(--ui-bg);
    border-radius: 30px;
    padding: 20px 40px;
    font-size: 36px;
    font-weight: 700;
    color: #2C3E50;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    text-align: center;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
  }

  .message-banner.show {
    transform: translate(-50%, -50%) scale(1);
  }

  .bait-box-btn {
    position: absolute;
    bottom: 16px; left: 16px;
    width: 90px; height: 90px;
    background: linear-gradient(135deg, #E74C3C, #C0392B);
    border-radius: 22px;
    border: 4px solid #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.2s;
    font-family: 'Fredoka', sans-serif;
  }

  .bait-box-btn:active {
    transform: scale(0.9);
  }

  .bait-box-btn .icon { font-size: 36px; line-height: 1; }
  .bait-box-btn .label { font-size: 14px; font-weight: 600; color: #fff; margin-top: 2px; }

  .bucket-btn {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 90px; height: 90px;
    background: linear-gradient(135deg, #E67E22, #D35400);
    border-radius: 22px;
    border: 4px solid #fff;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    transition: transform 0.2s;
    font-family: 'Fredoka', sans-serif;
  }

  .bucket-btn:active {
    transform: scale(0.9);
  }

  .bucket-btn .icon { font-size: 36px; line-height: 1; }
  .bucket-btn .label { font-size: 14px; font-weight: 600; color: #fff; margin-top: 2px; }

  .instruction {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ui-bg);
    border-radius: 16px;
    padding: 10px 24px;
    font-size: 20px;
    font-weight: 600;
    color: #555;
    box-shadow: 0 4px 15px rgba(0,0,0,0.12);
    pointer-events: none;
    text-align: center;
    transition: opacity 0.4s;
    max-width: 90%;
  }

  .celebration {
    position: fixed;
    pointer-events: none;
    font-size: 50px;
    z-index: 100;
    animation: floatUp 1.5s ease-out forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-200px) scale(1.5) rotate(20deg); }
  }

  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-8deg); }
    75% { transform: rotate(8deg); }
  }

  .wobble {
    animation: wobble 0.4s ease-in-out 3;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui-overlay">
  <div class="bait-panel" id="baitPanel">🪱 Bait: <span id="baitCount">3</span></div>
  <div class="score-panel">🪣 <span id="score">0</span></div>

  <div class="message-banner" id="message"></div>

  <div class="bait-box-btn" id="baitBoxBtn" title="Get Bait">
    <span class="icon">🪱</span>
    <span class="label">BAIT</span>
  </div>

  <div class="bucket-btn" id="bucketBtn" title="View Bucket">
    <span class="icon">🪣</span>
    <span class="label">BUCKET</span>
  </div>

  <div class="instruction" id="instruction">Tap 🪱 BAIT to put a worm on your hook!</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
const DPR = window.devicePixelRatio || 1;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Game state
const WATER_Y_RATIO = 0.42;
let waterY = H * WATER_Y_RATIO;

const state = {
  phase: 'need_bait', // need_bait, has_bait, casting, fishing, hooked, reeling, caught, bucket_view
  baitCount: 3,
  score: 0,
  caughtFish: [],
  rodTipX: W * 0.5,
  rodTipY: waterY - 30,
  hookX: W * 0.5,
  hookY: waterY - 30,
  hookTargetY: 0,
  hasBait: false,
  lineInWater: false,
  hookedFish: null,
  reelProgress: 0,
  castAnim: 0,
  bobTimer: 0,
  nibbleTimer: 0,
  showBucket: false,
};

// Fish in the river
const FISH_TYPES = [
  { name: 'Goldie', emoji: '🐠', color: '#F39C12', size: 40, speed: 0.6, kind: 'fish' },
  { name: 'Bluey', emoji: '🐟', color: '#3498DB', size: 35, speed: 0.8, kind: 'fish' },
  { name: 'Nemo', emoji: '🐠', color: '#FF6B35', size: 38, speed: 0.9, kind: 'nemo' },
  { name: 'Blowfish', emoji: '🐡', color: '#9B59B6', size: 45, speed: 0.4, kind: 'fish' },
  { name: 'Shrimp', emoji: '🦐', color: '#E74C3C', size: 25, speed: 1.2, kind: 'fish' },
  { name: 'Crabby', emoji: '🦀', color: '#E74C3C', size: 42, speed: 0.35, kind: 'crab' },
  { name: 'Mr Pinch', emoji: '🦀', color: '#C0392B', size: 48, speed: 0.25, kind: 'crab' },
  { name: 'Nemo Jr', emoji: '🐠', color: '#FF8C42', size: 30, speed: 1.1, kind: 'nemo' },
];

let fishes = [];

function spawnFish() {
  const type = FISH_TYPES[Math.floor(Math.random() * FISH_TYPES.length)];
  const dir = Math.random() > 0.5 ? 1 : -1;
  const yMin = waterY + 40;
  const yMax = H - 60;
  const isCrab = type.kind === 'crab';
  const y = isCrab ? H - 40 - Math.random() * 30 : yMin + Math.random() * (yMax - yMin);
  fishes.push({
    ...type,
    x: dir === 1 ? -60 : W + 60,
    y,
    dir,
    baseY: y,
    wobble: Math.random() * Math.PI * 2,
    interested: false,
    fleeing: false,
  });
}

for (let i = 0; i < 7; i++) {
  spawnFish();
  fishes[i].x = Math.random() * W;
}

// Bubbles
let bubbles = [];
function spawnBubble(x, y) {
  bubbles.push({ x: x || Math.random() * W, y: y || H, r: 2 + Math.random() * 5, speed: 0.5 + Math.random() * 1.5, opacity: 0.6 });
}

// Water ripples
let ripples = [];
function addRipple(x, y) {
  ripples.push({ x, y, r: 5, maxR: 40 + Math.random() * 20, opacity: 0.6 });
}

// Clouds
const clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({ x: Math.random() * W, y: 20 + Math.random() * (waterY * 0.4), w: 80 + Math.random() * 100, speed: 0.15 + Math.random() * 0.2 });
}

// Stars/sparkles for celebrations
let sparkles = [];

// ---- DRAWING ----

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, waterY);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#E0F4FF');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, waterY);

  // Sun
  ctx.fillStyle = '#FFD93D';
  ctx.shadowColor = '#FFD93D';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(W - 80, 70, 40, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const c of clouds) {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w * 0.5, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x - c.w * 0.25, c.y - 8, c.w * 0.3, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.25, c.y - 5, c.w * 0.35, 20, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGrass() {
  // River banks
  ctx.fillStyle = '#5CB85C';
  // Left bank
  ctx.beginPath();
  ctx.moveTo(0, waterY - 15);
  ctx.quadraticCurveTo(W * 0.15, waterY - 30, W * 0.08, waterY + 10);
  ctx.lineTo(0, waterY + 10);
  ctx.closePath();
  ctx.fill();

  // Right bank
  ctx.beginPath();
  ctx.moveTo(W, waterY - 15);
  ctx.quadraticCurveTo(W * 0.85, waterY - 30, W * 0.92, waterY + 10);
  ctx.lineTo(W, waterY + 10);
  ctx.closePath();
  ctx.fill();

  // Little grass tufts
  ctx.strokeStyle = '#449D44';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    const gx = 10 + Math.random() * W * 0.06;
    const gy = waterY - 10 + Math.random() * 10;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx - 3, gy - 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 4, gy - 14);
    ctx.stroke();
  }
  for (let i = 0; i < 8; i++) {
    const gx = W - 10 - Math.random() * W * 0.06;
    const gy = waterY - 10 + Math.random() * 10;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx - 3, gy - 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 4, gy - 14);
    ctx.stroke();
  }
}

function drawWater(t) {
  // Water body
  const grad = ctx.createLinearGradient(0, waterY, 0, H);
  grad.addColorStop(0, '#4A90D9');
  grad.addColorStop(0.5, '#357ABD');
  grad.addColorStop(1, '#2C5F8A');
  ctx.fillStyle = grad;
  ctx.fillRect(0, waterY, W, H - waterY);

  // Sandy riverbed at the bottom
  const sandGrad = ctx.createLinearGradient(0, H - 35, 0, H);
  sandGrad.addColorStop(0, 'rgba(210, 180, 120, 0.3)');
  sandGrad.addColorStop(1, 'rgba(194, 160, 100, 0.5)');
  ctx.fillStyle = sandGrad;
  ctx.beginPath();
  ctx.moveTo(0, H - 25);
  for (let x = 0; x <= W; x += 30) {
    ctx.lineTo(x, H - 25 + Math.sin(x * 0.04 + 1) * 5);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Small pebbles
  ctx.fillStyle = 'rgba(160, 140, 100, 0.4)';
  for (let i = 0; i < 12; i++) {
    const px = (i * 73 + 20) % W;
    const py = H - 12 + Math.sin(i * 2.3) * 5;
    ctx.beginPath();
    ctx.ellipse(px, py, 4 + (i % 3) * 2, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Seaweed
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const seaweedPositions = [W * 0.1, W * 0.25, W * 0.55, W * 0.75, W * 0.9];
  for (const sx of seaweedPositions) {
    const sway = Math.sin(t * 1.5 + sx * 0.01) * 8;
    const sheight = 40 + Math.sin(sx) * 15;
    ctx.strokeStyle = 'rgba(46, 139, 87, 0.6)';
    ctx.beginPath();
    ctx.moveTo(sx, H - 15);
    ctx.quadraticCurveTo(sx + sway, H - 15 - sheight * 0.5, sx + sway * 1.3, H - 15 - sheight);
    ctx.stroke();
    // Second strand
    ctx.strokeStyle = 'rgba(60, 160, 100, 0.5)';
    ctx.beginPath();
    ctx.moveTo(sx + 6, H - 15);
    ctx.quadraticCurveTo(sx + 6 + sway * 0.8, H - 15 - sheight * 0.4, sx + 6 + sway, H - 15 - sheight * 0.8);
    ctx.stroke();
  }

  // Waves on top
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  for (let row = 0; row < 3; row++) {
    ctx.beginPath();
    const yy = waterY + row * 30 + 5;
    for (let x = 0; x <= W; x += 5) {
      const wave = Math.sin((x + t * 60 + row * 100) * 0.02) * 4;
      if (x === 0) ctx.moveTo(x, yy + wave);
      else ctx.lineTo(x, yy + wave);
    }
    ctx.stroke();
  }

  // Bubbles
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (const b of bubbles) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ripples
  for (const r of ripples) {
    ctx.strokeStyle = `rgba(255,255,255,${r.opacity})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r * 0.3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawFish(f, t) {
  const kind = f.kind || 'fish';
  if (kind === 'crab') return drawCrab(f, t);
  if (kind === 'nemo') return drawNemo(f, t);

  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.scale(f.dir, 1);

  const sz = f.size;
  // Body
  ctx.fillStyle = f.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 0.6, sz * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(-sz * 0.5, 0);
  ctx.lineTo(-sz * 0.85, -sz * 0.3);
  ctx.lineTo(-sz * 0.85, sz * 0.3);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sz * 0.25, -sz * 0.08, sz * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(sz * 0.28, -sz * 0.08, sz * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sz * 0.5, sz * 0.05, 4, 0, Math.PI);
  ctx.stroke();

  // Fin
  ctx.fillStyle = adjustColor(f.color, -30);
  ctx.beginPath();
  ctx.moveTo(0, -sz * 0.3);
  ctx.lineTo(-sz * 0.1, -sz * 0.55);
  ctx.lineTo(sz * 0.15, -sz * 0.3);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawNemo(f, t) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.scale(f.dir, 1);

  const sz = f.size;

  // Body - orange
  ctx.fillStyle = f.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 0.6, sz * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail - orange
  ctx.beginPath();
  ctx.moveTo(-sz * 0.5, 0);
  ctx.lineTo(-sz * 0.88, -sz * 0.32);
  ctx.lineTo(-sz * 0.88, sz * 0.32);
  ctx.closePath();
  ctx.fill();

  // White stripes (3 classic clownfish bands)
  ctx.fillStyle = '#FFFFFF';
  // Front stripe
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(sz * 0.3, 0, sz * 0.07, sz * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Middle stripe
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 0.07, sz * 0.38, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Back stripe
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(-sz * 0.3, 0, sz * 0.06, sz * 0.32, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Black outlines on stripes
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(sz * 0.3, 0, sz * 0.07, sz * 0.38, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(0, 0, sz * 0.07, sz * 0.38, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-sz * 0.3, 0, sz * 0.06, sz * 0.32, 0, 0, Math.PI * 2); ctx.stroke();

  // Tail stripe
  ctx.fillStyle = '#fff';
  ctx.fillRect(-sz * 0.62, -sz * 0.2, sz * 0.08, sz * 0.4);

  // Dorsal fin
  ctx.fillStyle = f.color;
  ctx.beginPath();
  ctx.moveTo(-sz * 0.15, -sz * 0.35);
  ctx.quadraticCurveTo(sz * 0.05, -sz * 0.65, sz * 0.2, -sz * 0.35);
  ctx.closePath();
  ctx.fill();
  // Fin black edge
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Eye - big cute eye
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sz * 0.32, -sz * 0.06, sz * 0.14, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.arc(sz * 0.35, -sz * 0.06, sz * 0.08, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(sz * 0.37, -sz * 0.1, sz * 0.03, 0, Math.PI * 2);
  ctx.fill();

  // Cute smile
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(sz * 0.45, sz * 0.06, 4, 0.1, Math.PI - 0.1);
  ctx.stroke();

  ctx.restore();
}

function drawCrab(f, t) {
  ctx.save();
  ctx.translate(f.x, f.y);

  const sz = f.size;
  const walk = Math.sin(t * 5) * 3; // Walking wobble

  // Legs (4 on each side)
  ctx.strokeStyle = adjustColor(f.color, -20);
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 4; i++) {
      const angle = (i - 1.5) * 0.35 * side;
      const legLen = sz * 0.45;
      const lx = side * (sz * 0.25 + i * 4);
      const bend = Math.sin(t * 6 + i * 1.5) * 4;
      ctx.beginPath();
      ctx.moveTo(lx, sz * 0.05);
      ctx.quadraticCurveTo(lx + side * legLen * 0.6, sz * 0.1 + bend, lx + side * legLen, sz * 0.35);
      ctx.stroke();
    }
  }

  // Body (wide oval)
  ctx.fillStyle = f.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, sz * 0.5, sz * 0.35, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shell details - darker spots
  ctx.fillStyle = adjustColor(f.color, -25);
  ctx.beginPath();
  ctx.ellipse(0, -sz * 0.05, sz * 0.3, sz * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shell highlight
  ctx.fillStyle = adjustColor(f.color, 30);
  ctx.beginPath();
  ctx.ellipse(-sz * 0.08, -sz * 0.15, sz * 0.12, sz * 0.07, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Claws (pincers!)
  const clawOpen = Math.sin(t * 3) * 0.15 + 0.3;
  for (let side = -1; side <= 1; side += 2) {
    ctx.save();
    ctx.translate(side * sz * 0.45, -sz * 0.1);

    // Arm
    ctx.strokeStyle = f.color;
    ctx.lineWidth = sz * 0.12;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(side * sz * 0.25, -sz * 0.15);
    ctx.stroke();

    // Top pincer
    ctx.fillStyle = adjustColor(f.color, 10);
    ctx.beginPath();
    ctx.moveTo(side * sz * 0.25, -sz * 0.15);
    ctx.lineTo(side * sz * 0.5, -sz * 0.35 - clawOpen * sz);
    ctx.lineTo(side * sz * 0.38, -sz * 0.18);
    ctx.closePath();
    ctx.fill();

    // Bottom pincer
    ctx.beginPath();
    ctx.moveTo(side * sz * 0.25, -sz * 0.15);
    ctx.lineTo(side * sz * 0.5, -sz * 0.1 + clawOpen * sz * 0.5);
    ctx.lineTo(side * sz * 0.38, -sz * 0.12);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  // Eyes on stalks
  for (let side = -1; side <= 1; side += 2) {
    const ex = side * sz * 0.18;
    const ey = -sz * 0.35;

    // Stalk
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(ex, -sz * 0.2);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    // Eye ball
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ex, ey, sz * 0.1, 0, Math.PI * 2);
    ctx.fill();

    // Pupil
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(ex + side * 2, ey, sz * 0.05, 0, Math.PI * 2);
    ctx.fill();
  }

  // Mouth
  ctx.strokeStyle = '#922';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, sz * 0.1, 4, 0, Math.PI);
  ctx.stroke();

  ctx.restore();
}

function adjustColor(hex, amt) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.max(0, Math.min(255, r + amt));
  g = Math.max(0, Math.min(255, g + amt));
  b = Math.max(0, Math.min(255, b + amt));
  return `rgb(${r},${g},${b})`;
}

function drawRod(t) {
  const baseX = W * 0.5;
  const baseY = waterY - 10;
  const tipX = state.rodTipX;
  const tipY = state.rodTipY;

  // Rod (stick)
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(baseX, baseY + 40);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();

  // Rod handle
  ctx.strokeStyle = '#6B4F12';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(baseX, baseY + 40);
  ctx.lineTo(baseX, baseY + 65);
  ctx.stroke();

  // Cork grip
  ctx.strokeStyle = '#D4A052';
  ctx.lineWidth = 12;
  ctx.beginPath();
  ctx.moveTo(baseX, baseY + 55);
  ctx.lineTo(baseX, baseY + 70);
  ctx.stroke();

  // Fishing line
  if (state.lineInWater || state.phase === 'casting') {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);

    // Slight curve in the line
    const midX = (tipX + state.hookX) / 2;
    const midY = (tipY + state.hookY) / 2 - 10;
    ctx.quadraticCurveTo(midX, midY, state.hookX, state.hookY);
    ctx.stroke();

    // Hook
    drawHook(state.hookX, state.hookY, state.hasBait);

    // Bobber
    if (state.lineInWater) {
      const bobY = waterY + Math.sin(t * 3 + state.bobTimer) * 3;
      // Float line
      const bobX = state.hookX;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(bobX, bobY - 6, 6, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#E74C3C';
      ctx.beginPath();
      ctx.ellipse(bobX, bobY - 14, 5, 6, 0, 0, Math.PI);
      ctx.fill();
    }
  }
}

function drawHook(x, y, hasBait) {
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x, y + 14);
  ctx.arc(x + 6, y + 14, 6, Math.PI, 0, true);
  ctx.lineTo(x + 12, y + 8);
  ctx.stroke();

  // Bait worm
  if (hasBait) {
    ctx.strokeStyle = '#E74C3C';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x + 2, y + 12);
    ctx.quadraticCurveTo(x - 4, y + 20, x + 4, y + 24);
    ctx.quadraticCurveTo(x + 10, y + 28, x + 3, y + 32);
    ctx.stroke();
  }
}

function drawBucketView() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Bucket
  const bx = W / 2;
  const by = H / 2;
  const bw = Math.min(280, W * 0.7);
  const bh = bw * 0.8;

  // Bucket body
  ctx.fillStyle = '#E67E22';
  ctx.beginPath();
  ctx.moveTo(bx - bw/2, by - bh/3);
  ctx.lineTo(bx - bw/2 + 15, by + bh/2);
  ctx.lineTo(bx + bw/2 - 15, by + bh/2);
  ctx.lineTo(bx + bw/2, by - bh/3);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#D35400';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Bucket rim
  ctx.fillStyle = '#D35400';
  ctx.beginPath();
  ctx.ellipse(bx, by - bh/3, bw/2, 18, 0, 0, Math.PI * 2);
  ctx.fill();

  // Water in bucket
  ctx.fillStyle = 'rgba(74, 144, 217, 0.6)';
  ctx.beginPath();
  ctx.ellipse(bx, by - bh/3 + 8, bw/2 - 8, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Handle
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(bx, by - bh/3 - 40, bw/3, Math.PI * 0.15, Math.PI * 0.85);
  ctx.stroke();

  // Fish inside
  if (state.caughtFish.length === 0) {
    ctx.fillStyle = '#fff';
    ctx.font = '600 22px Fredoka';
    ctx.textAlign = 'center';
    ctx.fillText('Empty! Go catch some fish!', bx, by + 20);
  } else {
    const cols = Math.min(4, state.caughtFish.length);
    const rows = Math.ceil(state.caughtFish.length / cols);
    const spacing = 55;
    for (let i = 0; i < state.caughtFish.length; i++) {
      const row = Math.floor(i / cols);
      const col = i % cols;
      const fx = bx - ((cols - 1) * spacing) / 2 + col * spacing;
      const fy = by - 10 + row * 50;
      ctx.font = '36px serif';
      ctx.textAlign = 'center';
      ctx.fillText(state.caughtFish[i].emoji, fx, fy);
      ctx.font = '600 13px Fredoka';
      ctx.fillStyle = '#fff';
      ctx.fillText(state.caughtFish[i].name, fx, fy + 18);
    }
  }

  // Close hint
  ctx.fillStyle = '#fff';
  ctx.font = '600 20px Fredoka';
  ctx.textAlign = 'center';
  ctx.fillText('Tap anywhere to close', bx, by + bh/2 + 40);
}

// ---- GAME LOGIC ----

function showMessage(text, duration = 1800) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function setInstruction(text) {
  document.getElementById('instruction').textContent = text;
}

function updateUI() {
  document.getElementById('baitCount').textContent = state.baitCount;
  document.getElementById('score').textContent = state.score;
}

function celebrate(x, y) {
  const emojis = ['⭐', '🎉', '✨', '🌟', '🎊'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'celebration';
    el.textContent = emojis[i % emojis.length];
    el.style.left = (x - 25 + Math.random() * 50) + 'px';
    el.style.top = (y + Math.random() * 30) + 'px';
    el.style.animationDelay = (i * 0.1) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// Bait button
document.getElementById('baitBoxBtn').addEventListener('click', () => {
  if (state.showBucket) return;
  if (state.phase === 'need_bait') {
    if (state.baitCount > 0) {
      state.baitCount--;
      state.hasBait = true;
      state.phase = 'has_bait';
      showMessage('🪱 Worm on the hook!');
      setInstruction('Tap the water to cast your line!');
      updateUI();

      // Wobble the bait button
      const btn = document.getElementById('baitBoxBtn');
      btn.classList.add('wobble');
      setTimeout(() => btn.classList.remove('wobble'), 1500);
    } else {
      showMessage('No bait left! Tap 🪱 to dig for more!');
      // Give more bait after a short delay (toddler friendly - infinite bait)
      setTimeout(() => {
        state.baitCount = 3;
        updateUI();
        showMessage('🪱 Found 3 more worms!');
      }, 1000);
    }
  }
});

// Bucket button
document.getElementById('bucketBtn').addEventListener('click', () => {
  state.showBucket = !state.showBucket;
});

// Canvas tap - cast line or reel in
canvas.addEventListener('click', (e) => {
  const x = e.clientX;
  const y = e.clientY;

  if (state.showBucket) {
    state.showBucket = false;
    return;
  }

  if (state.phase === 'has_bait' && y > waterY) {
    // Cast line!
    state.phase = 'casting';
    state.hookX = x;
    state.hookY = waterY;
    state.hookTargetY = Math.min(y, H - 40);
    state.lineInWater = true;
    state.castAnim = 0;
    addRipple(x, waterY);
    showMessage('🎣 Line cast!');
    setInstruction('Wait for a fish to nibble...');
    // Set nibble timer
    state.nibbleTimer = 1.5 + Math.random() * 3;
  }

  if (state.phase === 'hooked') {
    // Reel in!
    state.phase = 'reeling';
    state.reelProgress = 0;
    showMessage('🐟 Reel it in! Tap tap tap!');
    setInstruction('Keep tapping to reel in the fish!');
  }

  if (state.phase === 'reeling') {
    state.reelProgress += 0.18;
    addRipple(state.hookX + (Math.random() - 0.5) * 20, waterY);

    if (state.reelProgress >= 1) {
      // Caught!
      state.phase = 'caught';
      const fish = state.hookedFish;
      state.caughtFish.push({ name: fish.name, emoji: fish.emoji });
      state.score++;
      state.hookedFish = null;
      state.lineInWater = false;
      state.hasBait = false;
      updateUI();
      const catchMsg = fish.kind === 'crab' ? `🦀 You caught ${fish.name}! Snip snap!` :
                       fish.kind === 'nemo' ? `🐠 You found ${fish.name}! Amazing!` :
                       `🎉 You caught ${fish.name}!`;
      showMessage(catchMsg, 2500);
      celebrate(state.hookX, waterY - 50);
      setInstruction('Tap 🪱 BAIT for another worm!');

      // Remove from river
      fishes = fishes.filter(f => f !== fish);
      spawnFish();

      setTimeout(() => {
        state.phase = 'need_bait';
      }, 1500);
    }
  }

  if (state.phase === 'fishing' && y < waterY) {
    // Tapped above water - pull out (lost bait)
    state.lineInWater = false;
    state.hasBait = false;
    state.phase = 'need_bait';
    showMessage('Line pulled out!');
    setInstruction('Tap 🪱 BAIT to put a worm on your hook!');
  }
});

// ---- UPDATE LOOP ----

let lastTime = 0;
function update(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  waterY = H * WATER_Y_RATIO;

  // Update rod tip
  state.rodTipX = W * 0.5 + Math.sin(timestamp * 0.001) * 3;
  state.rodTipY = waterY - 60;

  // Casting animation
  if (state.phase === 'casting') {
    state.castAnim += dt * 3;
    state.hookY = waterY + (state.hookTargetY - waterY) * Math.min(state.castAnim, 1);
    if (state.castAnim >= 1) {
      state.phase = 'fishing';
    }
  }

  // Bobbing
  state.bobTimer += dt;

  // Nibble timer
  if (state.phase === 'fishing' && state.hasBait) {
    state.nibbleTimer -= dt;

    // Attract nearest fish
    let nearest = null;
    let nearDist = Infinity;
    for (const f of fishes) {
      const d = Math.hypot(f.x - state.hookX, f.y - state.hookY);
      if (d < nearDist) {
        nearDist = d;
        nearest = f;
      }
    }

    if (nearest && state.nibbleTimer < 1.5) {
      nearest.interested = true;
      // Swim toward hook
      const dx = state.hookX - nearest.x;
      const dy = state.hookY - nearest.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 5) {
        nearest.x += (dx / dist) * nearest.speed * 80 * dt;
        nearest.y += (dy / dist) * nearest.speed * 80 * dt;
        nearest.dir = dx > 0 ? 1 : -1;
      }
    }

    if (state.nibbleTimer <= 0 && nearest) {
      // Fish bites!
      state.phase = 'hooked';
      state.hookedFish = nearest;
      showMessage('🔔 A fish is biting! TAP!', 2500);
      setInstruction('TAP the screen to reel it in!');

      // Wobble bobber
      state.bobTimer = 100;
    }
  }

  // Hooked fish follows hook
  if (state.hookedFish && (state.phase === 'hooked' || state.phase === 'reeling')) {
    state.hookedFish.x += (state.hookX - state.hookedFish.x) * 0.1;
    state.hookedFish.y += (state.hookY - state.hookedFish.y) * 0.1;
  }

  // Reeling - move hook up
  if (state.phase === 'reeling') {
    state.hookY = state.hookTargetY + (waterY - 50 - state.hookTargetY) * state.reelProgress;
  }

  // Update fishes
  for (const f of fishes) {
    if (!f.interested && f !== state.hookedFish) {
      f.x += f.dir * f.speed * 40 * dt;
      f.wobble += dt * 2;
      if (f.kind === 'crab') {
        // Crabs stay near the bottom, slight side-shuffle wobble
        f.y = f.baseY + Math.sin(f.wobble * 1.5) * 2;
      } else {
        f.y = f.baseY + Math.sin(f.wobble) * 8;
      }

      // Wrap around
      if (f.x < -80) { f.x = W + 80; f.dir = -1; }
      if (f.x > W + 80) { f.x = -80; f.dir = 1; }
    }
  }

  // Clouds
  for (const c of clouds) {
    c.x += c.speed;
    if (c.x > W + 100) c.x = -100;
  }

  // Bubbles
  if (Math.random() < 0.03) spawnBubble(Math.random() * W, H);
  for (let i = bubbles.length - 1; i >= 0; i--) {
    bubbles[i].y -= bubbles[i].speed;
    bubbles[i].x += Math.sin(bubbles[i].y * 0.05) * 0.3;
    if (bubbles[i].y < waterY) bubbles.splice(i, 1);
  }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].r += dt * 40;
    ripples[i].opacity -= dt * 0.8;
    if (ripples[i].opacity <= 0) ripples.splice(i, 1);
  }

  // ---- DRAW ----
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawGrass();
  drawWater(timestamp / 1000);

  // Draw fishes
  for (const f of fishes) {
    drawFish(f, timestamp / 1000);
  }

  drawRod(timestamp / 1000);

  if (state.showBucket) {
    drawBucketView();
  }

  requestAnimationFrame(update);
}

requestAnimationFrame(update);
updateUI();
</script>
</body>
